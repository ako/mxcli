# PED (Studio Pro MCP server) authoring capabilities — the version-keyed table half
# of the capability model (ADR-0004). Tool *presence* is NOT here; it comes from a
# live tools/list probe. This file holds the facts that are not schema-discoverable:
# which features are authorable, and the reasons the rest are not (PED's create
# whitelist, behavioral quirks).
#
# Keyed by MCP serverInfo.version. The baseline below is the first server (1.0.0,
# shipped in Studio Pro 11.11). `available` means *the MCP backend can author it* —
# both PED permits it AND mxcli has a create path. To lift a blocked feature, set
# `available_since` to the MCP server version once BOTH hold (the loader flips it for
# servers at or above that version, and both the agent report and the backend's gate
# pick it up — they read this same table via `key`). Auditing entries is part of the
# "onboarding a new version" procedure in docs/03-development/PED_MCP_CAPABILITIES.md.
#
# `key` is the stable machine identifier the backend gates on (canAuthor(key)); the
# capability constants in capabilities.go must match these.

baseline_server_version: "1.0.0"

features:
  - key: modules
    feature: "Modules"
    available: true
    note: "CREATE"
  - key: entities
    feature: "Entities"
    available: true
    note: "CREATE/DROP (+ NOT NULL / UNIQUE validation rules on create); ALTER add/drop/rename attribute, entity & attribute documentation; generalization (extends)"
  - key: associations
    feature: "Associations"
    available: true
    note: "CREATE/DROP within a module"
  - key: enumerations
    feature: "Enumerations"
    available: true
    note: "CREATE (DROP via Concord)"
  - key: constants
    feature: "Constants"
    available: true
    note: "CREATE / CREATE OR MODIFY / DROP (String/Integer/Decimal/Boolean/DateTime)"
  - key: microflows
    feature: "Microflows"
    available: true
    note: "CREATE (broad activity + control-flow coverage)"
  - key: pages
    feature: "Pages"
    available: true
    note: "CREATE + ALTER (widget coverage grows per type)"
  - key: workflows
    feature: "Workflows"
    available: true
    note: "CREATE / CREATE OR REPLACE / DROP / ALTER (full, any nesting depth)"
  - key: view_entities
    feature: "View entities"
    available: true
    note: "CREATE"
  - key: documents_into_folders
    feature: "Documents into folders"
    available: true
    note: "create <doc> … folder 'A/B' (nested; folder auto-created)"

  # Gated create rejections — the backend checks these keys via canAuthor().
  - key: nanoflow_create
    feature: "Nanoflows — CREATE"
    available: false
    note: "PED's create whitelist excludes Microflows$Nanoflow (it covers microflows, not nanoflows)"
  - key: javaaction_create
    feature: "Java actions — CREATE"
    available: false
    note: "PED won't create JavaActions$JavaAction (a Java action is backed by a .java source Studio Pro generates)"
  - key: businessevent_create
    feature: "Business-event services — CREATE"
    available: false
    note: "PED won't create BusinessEvents$BusinessEventService (off the create whitelist); the published-event entities & constants it relies on ARE creatable"

  # Display-only blocked rows (not method-gated — these are whole features the backend
  # doesn't implement, or PED-fundamental limits unlikely to be lifted).
  - key: security_integrations_nav
    feature: "Security (roles, access, demo users), Navigation, OData/REST, mappings, settings"
    available: false
    note: "no PED write path"
  - key: attribute_type_change
    feature: "ALTER … MODIFY attribute type"
    available: false
    note: "PED can't change a type in place (would drop the column)"
  - key: entity_slice_gaps
    feature: "Entity defaults, indexes, non-persistent entities, event handlers, system members"
    available: false
    note: "the entity slice authors plain attributes + NOT NULL/UNIQUE; default values, indexes, and non-persistent entities are not built yet (and PED's entity constructor exposes no persistable flag)"
  - key: document_move
    feature: "MOVE / re-parent a document, empty CREATE FOLDER"
    available: false
    note: "PED can't re-parent documents or create empty folders"
  - key: pages_foldered
    feature: "Pages into folders"
    available: false
    note: "pg_write_page has no folderPath (page lands at the module root)"
