# PED (Studio Pro MCP server) authoring capabilities ‚Äî the version-keyed table half
# of the capability model (ADR-0004). Tool *presence* is NOT here; it comes from a
# live tools/list probe. This file holds the facts that are not schema-discoverable:
# which features are authorable, and the reasons the rest are not (PED's create
# whitelist, behavioral quirks).
#
# Keyed by MCP serverInfo.version. The baseline below is the first server (1.0.0,
# shipped in Studio Pro 11.11). `available` means *the MCP backend can author it* ‚Äî
# both PED permits it AND mxcli has a create path. To lift a blocked feature, set
# `available_since` to the MCP server version once BOTH hold (the loader flips it for
# servers at or above that version, and both the agent report and the backend's gate
# pick it up ‚Äî they read this same table via `key`). Auditing entries is part of the
# "onboarding a new version" procedure in docs/03-development/PED_MCP_CAPABILITIES.md.
#
# `key` is the stable machine identifier the backend gates on (canAuthor(key)); the
# capability constants in capabilities.go must match these.

baseline_server_version: "1.0.0"

features:
  - key: modules
    feature: "Modules"
    available: true
    note: "CREATE"
  - key: entities
    feature: "Entities"
    available: true
    note: "CREATE/DROP (+ NOT NULL / UNIQUE validation rules on create); ALTER add/drop/rename attribute, entity & attribute documentation; attribute default values (Studio Pro 11.12+, via the value/defaultValue path-op); generalization (extends)"
  - key: associations
    feature: "Associations"
    available: true
    note: "CREATE/DROP within a module"
  - key: enumerations
    feature: "Enumerations"
    available: true
    note: "CREATE (DROP via Concord)"
  - key: constants
    feature: "Constants"
    available: true
    note: "CREATE / CREATE OR MODIFY / DROP (String/Integer/Decimal/Boolean/DateTime)"
  - key: microflows
    feature: "Microflows"
    available: true
    note: "CREATE (broad activity + control-flow coverage)"
  - key: pages
    feature: "Pages"
    available: true
    note: "CREATE + ALTER (widget coverage grows per type)"
  - key: workflows
    feature: "Workflows"
    available: true
    note: "CREATE / CREATE OR REPLACE / DROP / ALTER (full, any nesting depth)"
  - key: view_entities
    feature: "View entities ‚Äî CREATE"
    available: false
    note: "PED syncs a view entity's attributes to its OQL only via the LLM-backed oql_generate tool; its deterministic write tools leave attributes as StoredValue, out of sync with the query (CE6770). mxcli writes user OQL verbatim and does not invoke the generator, so it does not author view entities over MCP"
  - key: documents_into_folders
    feature: "Documents into folders"
    available: true
    note: "create <doc> ‚Ä¶ folder 'A/B' (nested; folder auto-created)"

  # Gated create rejections ‚Äî the backend checks these keys via canAuthor().
  - key: nanoflow_create
    feature: "Nanoflows ‚Äî CREATE"
    available: false
    note: "PED's create whitelist excludes Microflows$Nanoflow (it covers microflows, not nanoflows)"
  - key: javaaction_create
    feature: "Java actions ‚Äî CREATE"
    available: false
    note: "PED won't create JavaActions$JavaAction (a Java action is backed by a .java source Studio Pro generates)"
  - key: businessevent_create
    feature: "Business-event services ‚Äî CREATE"
    available: false
    note: "PED won't create BusinessEvents$BusinessEventService (off the create whitelist); the published-event entities & constants it relies on ARE creatable"

  # Display-only blocked rows (not method-gated ‚Äî these are whole features the backend
  # doesn't implement, or PED-fundamental limits unlikely to be lifted).
  - key: navigation
    feature: "Navigation (web profile: home page, login/not-found page, menu tree)"
    available: true
    note: "CREATE OR REPLACE NAVIGATION on a web profile, via generic ped_update_document path-ops on the project-level Navigation$NavigationDocument (menu items use Menus$MenuItem + Pages$*ClientAction; the menu is cleared then rebuilt). Native profiles (bottom-bar items, native home) and role-based home pages are not authored yet"
  - key: entity_access_rules
    feature: "Entity access rules (GRANT)"
    available: true
    note: "GRANT a NEW entity access rule for an existing role ‚Äî the rule lives on DomainModels$Entity.accessRules (the domain-model document PED authors), NOT the security document. ADD-only: PED refuses to remove DomainModels$AccessRule / DomainModels$MemberAccess, so REVOKE and replacing an existing rule in place are rejected (edit in Studio Pro). The referenced module role must already exist"
  - key: security_roles
    feature: "Security roles & settings ‚Äî module roles, user roles, demo users, project security settings"
    available: false
    note: "PED reports 'Unknown document type' for Security$ProjectSecurity and Security$ModuleSecurity ‚Äî the security documents are not exposed, so roles/users/settings cannot be authored over MCP (entity access *rules* are separate ‚Äî see entity_access_rules)"
  - key: integrations_settings
    feature: "OData/REST, mappings, project settings"
    available: false
    note: "no PED write path"
  - key: attribute_type_change
    feature: "ALTER ‚Ä¶ MODIFY attribute type"
    available: false
    note: "PED can't change a type in place (would drop the column)"
  - key: entity_slice_gaps
    feature: "Entity defaults, indexes, non-persistent entities, event handlers, system members"
    available: false
    note: "the entity slice authors plain attributes + NOT NULL/UNIQUE; default values, indexes, and non-persistent entities are not built yet (and PED's entity constructor exposes no persistable flag)"
  - key: document_move
    feature: "MOVE / re-parent a document, empty CREATE FOLDER"
    available: false
    note: "PED can't re-parent documents or create empty folders"
  - key: pages_foldered
    feature: "Pages into folders"
    available: false
    note: "pg_write_page has no folderPath (page lands at the module root)"
